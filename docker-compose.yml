# =============================================================================
# High Throughput Error Ingestion — Docker Compose
# Network: bridge (explicit port mappings for visibility)
# =============================================================================

services:

  mysql:
    image: mysql:8.0
    container_name: htei_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - htei_net

  redis:
    image: redis:7-alpine
    container_name: htei_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --port 6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - htei_net

  backend:
    build: ./backend
    container_name: htei_backend
    restart: unless-stopped
    ports:
      - "${PORT:-9002}:9002"
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: mysql         # ✅ service name, not localhost
      REDIS_HOST: redis      # ✅ service name, not localhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'
        reservations:
          memory: 256m
          cpus: '0.5'
    networks:
      - htei_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: htei_cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - htei_net

  prometheus:
    image: prom/prometheus:latest
    container_name: htei_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9090'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - cadvisor
    networks:
      - htei_net

  grafana:
    image: grafana/grafana:latest
    container_name: htei_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SERVER_HTTP_PORT: 3000
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - htei_net

networks:
  htei_net:
    driver: bridge

volumes:
  mysql-data:
  grafana-data:
  redis-data: